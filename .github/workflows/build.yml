name: Build APK Automatica

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Desempaquetar proyecto
      run: unzip -o showstation.zip -d . || true

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Instalar Dependencias del Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev unzip zip libltdl-dev

    - name: Instalar Buildozer y Cython
      run: |
        pip3 install --user --upgrade "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Preinstalar Herramientas de Android SDK (sdkmanager)
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin || true
        # Descargamos directamente las herramientas oficiales para que no marque ausencia
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/ || true
        rm -rf cmdline-tools cmdline.zip

    - name: Aceptar Licencias de Android por Adelantado
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses || true
        echo "247a1c6d50f84b38a63412d2b1fbb09779201d9a" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license || true
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license || true

    - name: Configurar Buildozer .spec
      run: |
        ~/.local/bin/buildozer init
        sed -i 's/#android.build_tools_version =/android.build_tools_version = 34.0.0/g' buildozer.spec
        sed -i 's/#android.api = 33/android.api = 34/g' buildozer.spec
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,mp3,mp4,avi,mkv/g' buildozer.spec
        sed -i 's/requirements = python3, kivy/requirements = python3==3.11.5, kivy/g' buildozer.spec

    - name: Compilar APK en modo silencioso
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        PLAY_STORE_BUILD: 0
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Guardar Archivo Final (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Showstation-APK-Enrique
        path: bin/*.apk
