name: Compilacion Showstation Real

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Desempaquetar proyecto
      run: unzip -o showstation.zip -d . || true

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK Oficial (Evita fallos de sdkmanager)
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2

    - name: Instalar Dependencias del Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev unzip zip libltdl-dev

    - name: Instalar Buildozer y Cython Estables
      run: |
        pip3 install --user --upgrade "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Configurar Buildozer en base al SDK existente
      run: |
        ~/.local/bin/buildozer init
        # Mapeamos a las carpetas oficiales que acabamos de crear en el servidor
        sed -i 's/#android.build_tools_version =/android.build_tools_version = 33.0.2/g' buildozer.spec
        sed -i 's/#android.api = 33/android.api = 33/g' buildozer.spec
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,mp3,mp4,avi,mkv/g' buildozer.spec
        sed -i 's/requirements = python3, kivy/requirements = python3==3.11.5, kivy, ffpyplayer/g' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        
        # Truco Maestro: Le decimos a Buildozer exactamente donde dejamos el SDK para que no descargue nada nuevo
        sed -i "s|# android.sdk_path =|android.sdk_path = $ANDROID_HOME|g" buildozer.spec

    - name: Compilar APK sin interferencias
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        PLAY_STORE_BUILD: 0
      run: |
        export PATH=$PATH:~/.local/bin
        # Aceptamos licencias globales de forma directa en la terminal
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        buildozer android debug
        
    - name: Guardar Archivo Final (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Showstation-APK-Enrique
        path: bin/*.apk
