name: Compilacion Showstation Real

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Desempaquetar proyecto
      run: unzip -o showstation.zip -d . || true

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Instalar Dependencias del Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev unzip zip libltdl-dev

    - name: Instalar Buildozer y Cython Estables
      run: |
        pip3 install --user --upgrade "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Forzar Aceptacion Total de Licencias Google
      run: |
        # 1. Creamos las carpetas de licencias del SDK en la raiz del servidor
        mkdir -p ~/.android || true
        touch ~/.android/repositories.cfg || true
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses || true
        
        # 2. Inyectamos la firma digital aprobada para CUALQUIER herramienta de Android (incluyendo la version 37)
        echo -e "\n247a1c6d50f84b38a63412d2b1fbb09779201d9a\n28a63412d2b1fbb09779201d9a" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license || true
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license || true

    - name: Configurar Buildozer Estabilidad Total
      run: |
        ~/.local/bin/buildozer init
        sed -i 's/#android.build_tools_version =/android.build_tools_version = 33.0.2/g' buildozer.spec
        sed -i 's/#android.api = 33/android.api = 33/g' buildozer.spec
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,mp3,mp4,avi,mkv/g' buildozer.spec
        sed -i 's/requirements = python3, kivy/requirements = python3==3.11.5, kivy/g' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec

    - name: Compilar APK Nivel Sistema
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        PLAY_STORE_BUILD: 0
      run: |
        export PATH=$PATH:~/.local/bin
        # Usamos el comando "yes" directo sobre el ejecutable para firmar cualquier rastro suelto
        yes | buildozer android debug

    - name: Guardar Archivo Final (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Showstation-APK-Enrique
        path: bin/*.apk
