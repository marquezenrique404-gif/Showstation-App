name: Compilacion Showstation Final

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Desempaquetar proyecto
      run: unzip -o showstation.zip -d . || true

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Instalar Dependencias del Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev unzip zip libltdl-dev

    - name: Instalar Buildozer Estables
      run: |
        pip3 install --user --upgrade "buildozer==1.5.0" "cython<3.0.0" virtualenv

    - name: Configurar Buildozer Automático
      run: |
        ~/.local/bin/buildozer init
        # Configuramos la app para que use la API 33 nativa
        sed -i 's/#android.build_tools_version =/android.build_tools_version = 33.0.2/g' buildozer.spec
        sed -i 's/#android.api = 33/android.api = 33/g' buildozer.spec
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,mp3,mp4,avi,mkv/g' buildozer.spec
        sed -i 's/requirements = python3, kivy/requirements = python3==3.11.5, kivy/g' buildozer.spec
        
    - name: Compilar APK (Aceptando todo por contrato)
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        PLAY_STORE_BUILD: 0
      run: |
        export PATH=$PATH:~/.local/bin
        # Este comando le pasa de forma automatizada la letra "y" a cada pregunta del SDK de Android
        expect -c "
        spawn buildozer android debug
        expect \"Accept? (y/N):\" { send \"y\r\"; exp_continue }
        expect eof
        " || buildozer android debug

    - name: Guardar Archivo Final (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Showstation-APK-Enrique
        path: bin/*.apk
